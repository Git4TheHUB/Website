<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest Roblox Controller</title>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; }
        canvas { display:block; }
        #log { position:absolute; bottom:10px; left:10px; max-height:40%; overflow:auto; font-size:14px; }
    </style>
</head>
<body>
    <div style="position:absolute;top:10px;left:10px;">Quest Controller → Roblox (Pythonista)</div>
    <div id="log"></div>
    <canvas id="game"></canvas>

    <script src="https://unpkg.com/netplayjs@0.4.1/dist/netplay.js"></script>
    <script>
        const RELAY_URL = "http://192.168.1.22:8080";
        let logDiv = document.getElementById("log");

        function log(msg) {
            const entry = document.createElement("div");
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.children[0]);
            console.log(msg);
        }

        class Controller extends netplayjs.Game {
            constructor() {
                super();
                this.state = {moveX:0, moveZ:0, lookX:0, lookY:0, jump:false, primaryAction:false};
            }

            tick(playerInputs) {
                for (let [_, input] of playerInputs) {
                    const k = input.keys || {};
                    const pads = navigator.getGamepads ? navigator.getGamepads() : [];

                    let mx = (k['KeyD']||0) - (k['KeyA']||0);
                    let mz = (k['KeyS']||0) - (k['KeyW']||0);
                    let lx = (k['ArrowRight']||0) - (k['ArrowLeft']||0);
                    let ly = (k['ArrowDown']||0) - (k['ArrowUp']||0);

                    for (let pad of pads) {
                        if (pad && pad.axes && pad.axes.length >= 4) {
                            mx = pad.axes[0];
                            mz = pad.axes[1];
                            lx = pad.axes[2];
                            ly = pad.axes[3];
                            this.state.jump = pad.buttons[0] ? pad.buttons[0].pressed : false;
                            this.state.primaryAction = pad.buttons[7] ? pad.buttons[7].pressed : false;
                        }
                    }

                    this.state.moveX = mx;
                    this.state.moveZ = mz;
                    this.state.lookX = lx;
                    this.state.lookY = ly;

                    // Send to Pythonista
                    fetch(RELAY_URL, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(this.state)
                    }).then(() => {}).catch(() => {});

                    log(`Quest Input → move: ${mx.toFixed(2)}, ${mz.toFixed(2)} | look: ${lx.toFixed(2)}, ${ly.toFixed(2)}`);
                }
            }

            draw(c) {
                const ctx = c.getContext("2d");
                ctx.fillStyle = "#111";
                ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = "#0f0";
                ctx.font = "24px monospace";
                ctx.fillText("🎮 Quest Controller Running", 50, 100);
            }
        }

        Controller.timestep = 1000/60;
        new netplayjs.RollbackWrapper(Controller).start();

        // Poll Roblox state back
        setInterval(() => {
            fetch(RELAY_URL)
                .then(r => r.json())
                .then(data => {
                    if (data.roblox) {
                        log(`Roblox → Pos: ${data.roblox.position.map(n=>n.toFixed(1))} | Rot: ${data.roblox.rotation.toFixed(1)}`);
                    }
                })
                .catch(() => {});
        }, 500);
    </script>
</body>
</html>
