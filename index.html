<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 3 Head Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #111; color: white; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; margin: 20px; background: #0066ff; color: white; border: none; border-radius: 10px; }
    pre { background: #222; padding: 15px; border-radius: 8px; text-align: left; max-width: 600px; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>Quest 3 Head Tracker</h1>
  <button onclick="startXR()">Enter Immersive VR Mode</button>
  <pre id="pose">Waiting...</pre>

  <script>
    const poseEl = document.getElementById('pose');
    let serverUrl = 'http://YOUR_IPHONE_IP:8080';   // ←←← CHANGE THIS to your iPhone IP

    async function startXR() {
      if (!navigator.xr) {
        alert("WebXR not supported on this browser.");
        return;
      }
      try {
        const session = await navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: ['local-floor']
        });
        
        const refSpace = await session.requestReferenceSpace('local-floor');
        
        session.requestAnimationFrame(function onFrame(time, frame) {
          const pose = frame.getViewerPose(refSpace);
          if (pose) {
            const pos = pose.transform.position;
            const quat = pose.transform.orientation;
            const data = {
              timestamp: Date.now(),
              position: { x: pos.x, y: pos.y, z: pos.z },
              orientation: { x: quat.x, y: quat.y, z: quat.z, w: quat.w }
            };
            
            poseEl.textContent = JSON.stringify(data, null, 2);
            fetch(serverUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            }).catch(() => {});
          }
          session.requestAnimationFrame(onFrame);
        });
      } catch (err) {
        alert("Failed to start Immersive mode:\n" + err.message);
      }
    }
  </script>
</body>
</html>
