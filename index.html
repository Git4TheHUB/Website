<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DVD Webcam Bouncer</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        height: 100vh;
        width: 100vw;
        color: white;
        font-family: 'Press Start 2P', system-ui;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
    }
    .info {
        text-align: center;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="info">
    PRESS <strong>E</strong> TO SPAWN MORE BOUNCING WEBCAM WINDOWS
</div>

<script>
// Function to create one bouncing DVD window
function spawnDvdWindow() {
    const width = 280;   // Smaller window
    const height = 160;  // Classic DVD aspect ratio, smaller size

    const dvdWin = window.open("", "dvdBouncer", 
        `width=${width},height=${height},left=300,top=200,resizable=no,scrollbars=no,menubar=no,toolbar=no,status=no`);

    if (!dvdWin) {
        alert("Popup blocked! Please allow popups for this site.");
        return;
    }

    dvdWin.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>DVD</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
            }
            #webcam {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
        </style>
    </head>
    <body>
        <video id="webcam" autoplay playsinline muted></video>

        <script>
            // Webcam
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    document.getElementById('webcam').srcObject = stream;
                })
                .catch(err => console.error("Webcam error", err));

            let vx = 6.8;
            let vy = 4.9;
            let hue = 0;

            function changeColor() {
                hue = (hue + 45 + Math.random() * 90) % 360;
                document.documentElement.style.filter = 
                    \`hue-rotate(\${hue}deg) saturate(1.8) brightness(1.25)\`;
            }

            function bounce() {
                let x = window.screenX;
                let y = window.screenY;
                const w = window.outerWidth;
                const h = window.outerHeight;

                x += vx;
                y += vy;

                const screenW = screen.availWidth;
                const screenH = screen.availHeight;

                let bounced = false;

                if (x <= 0 || x + w >= screenW) {
                    vx = -vx;
                    bounced = true;
                }
                if (y <= 0 || y + h >= screenH) {
                    vy = -vy;
                    bounced = true;
                }

                if (bounced) {
                    changeColor();
                }

                window.moveTo(Math.round(x), Math.round(y));

                // Occasional speed variation
                if (Math.random() < 0.035) {
                    vx += (Math.random() - 0.5) * 1.8;
                    vy += (Math.random() - 0.5) * 1.8;
                }

                requestAnimationFrame(bounce);
            }

            // Start bouncing
            setTimeout(() => {
                const startX = Math.random() * (screen.availWidth - ${width} - 50);
                const startY = Math.random() * (screen.availHeight - ${height} - 50);
                window.moveTo(startX, startY);
                bounce();
            }, 300);
        <\/script>
    </body>
    </html>`);

    dvdWin.document.close();
}

// Keyboard handler - Press E to spawn new window
document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'e') {
        spawnDvdWindow();
    }
});

// Spawn the first window automatically
window.onload = () => {
    setTimeout(() => {
        spawnDvdWindow();
    }, 500);
};
</script>

</body>
</html>
