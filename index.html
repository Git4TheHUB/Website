<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario XR - Quest Controller Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(10, 15, 20, 0.9); color: #e2e8f0; 
            padding: 15px; border-radius: 8px; width: 300px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        button { 
            background: #0284c7; color: white; border: none; border-radius: 4px; 
            padding: 12px; width: 100%; margin: 8px 0; font-weight: bold; cursor: pointer;
        }
        #xrButton {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 200;
            padding: 15px 40px; font-size: 18px; font-weight: bold;
            background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Mario XR Demo</h2>
        <p><strong>Quest Controls:</strong><br>
        • Left Stick: Move Mario<br>
        • Right Stick: Camera / Turn<br>
        • Right Trigger: Jump<br>
        • Left Trigger: Punch / Action<br>
        • Grips: Crouch / Run</p>
        <button id="btnReset">Respawn Mario</button>
    </div>

    <button id="xrButton">Enter Mixed Reality (Quest)</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        // ==================== GLOBALS ====================
        let scene, camera, renderer, clock;
        let roomGroup;
        let mario, marioVelocity = new THREE.Vector3();
        let isJumping = false, isCrouching = false;
        let controllerL, controllerR;
        let moveDir = new THREE.Vector3();
        let roomDimensions = { w: 8, h: 3, l: 8 };

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            buildRoom();
            spawnMario();

            // UI
            document.getElementById('btnReset').addEventListener('click', () => {
                mario.position.set(0, 0.5, 0);
                marioVelocity.set(0,0,0);
            });

            const xrBtn = document.getElementById('xrButton');
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-ar').then(sup => {
                    if (sup) xrBtn.addEventListener('click', startXR);
                });
            }

            window.addEventListener('resize', onResize);
        }

        function buildRoom() {
            if (roomGroup) scene.remove(roomGroup);
            roomGroup = new THREE.Group();

            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x475569, roughness: 0.8, metalness: 0.2 
            });

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomDimensions.w * 2, roomDimensions.l * 2), mat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            roomGroup.add(floor);

            // Walls (simple box for collision demo)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x64748b });
            const walls = [
                { pos: [0, roomDimensions.h/2, -roomDimensions.l], size: [roomDimensions.w*2, roomDimensions.h, 0.2] },
                { pos: [0, roomDimensions.h/2, roomDimensions.l], size: [roomDimensions.w*2, roomDimensions.h, 0.2] },
                { pos: [-roomDimensions.w, roomDimensions.h/2, 0], size: [0.2, roomDimensions.h, roomDimensions.l*2] },
                { pos: [roomDimensions.w, roomDimensions.h/2, 0], size: [0.2, roomDimensions.h, roomDimensions.l*2] }
            ];
            walls.forEach(w => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
                mesh.position.set(...w.pos);
                mesh.castShadow = mesh.receiveShadow = true;
                roomGroup.add(mesh);
            });

            scene.add(roomGroup);
        }

        function spawnMario() {
            mario = new THREE.Group();
            
            // Simple Mario placeholder (body + head + hat)
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.3), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            mario.add(body);

            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), headMat);
            head.position.y = 1.1;
            mario.add(head);

            // Hat
            const hatMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.15, 32), hatMat);
            hat.rotation.x = Math.PI / 2;
            hat.position.set(0, 1.35, 0);
            mario.add(hat);

            mario.position.set(0, 0.5, 0);
            scene.add(mario);
        }

        async function startXR() {
            document.getElementById('xrButton').style.display = 'none';
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { 
                    requiredFeatures: ['local-floor'] 
                });
                renderer.xr.setSession(session);
                setupControllers();
                animate();
            } catch (e) {
                console.error(e);
                alert("Failed to start XR: " + e.message);
            }
        }

        function setupControllers() {
            controllerL = renderer.xr.getController(0);
            controllerR = renderer.xr.getController(1);
            scene.add(controllerL);
            scene.add(controllerR);

            // Visual rays
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)]);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x22ff88 });
            controllerL.add(new THREE.Line(lineGeo, lineMat));
            controllerR.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffaa22 })));

            // Input listeners
            controllerR.addEventListener('selectstart', () => { isJumping = true; });
            controllerL.addEventListener('selectstart', () => { /* punch animation */ });
        }

        function getControllerInput() {
            if (!controllerL || !controllerL.gamepad) return { move: new THREE.Vector2(0,0), turn: 0 };

            const gpL = controllerL.gamepad;
            const gpR = controllerR ? controllerR.gamepad : null;

            return {
                move: new THREE.Vector2(gpL.axes[2] || 0, gpL.axes[3] || 0), // left stick
                turn: gpR ? gpR.axes[2] || 0 : 0, // right stick X
                jump: controllerR && controllerR.gamepad ? controllerR.gamepad.buttons[0].pressed : false,
                action: controllerL && controllerL.gamepad ? controllerL.gamepad.buttons[0].pressed : false,
                grip: controllerL && controllerL.gamepad ? controllerL.gamepad.buttons[1].pressed : false
            };
        }

        function updateMarioPhysics(dt) {
            const input = getControllerInput();
            const speed = input.grip ? 8 : 5; // run/walk

            // Forward movement relative to camera
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0));

            moveDir.set(0,0,0);
            moveDir.addScaledVector(forward, -input.move.y * speed);
            moveDir.addScaledVector(right, input.move.x * speed);

            marioVelocity.x = moveDir.x;
            marioVelocity.z = moveDir.z;

            // Simple jump
            if (input.jump && !isJumping) {
                marioVelocity.y = 6;
                isJumping = true;
            }

            // Gravity
            marioVelocity.y -= 20 * dt;

            // Apply velocity
            mario.position.x += marioVelocity.x * dt;
            mario.position.z += marioVelocity.z * dt;
            mario.position.y += marioVelocity.y * dt;

            // Ground collision
            if (mario.position.y <= 0.5) {
                mario.position.y = 0.5;
                marioVelocity.y = 0;
                isJumping = false;
            }

            // Simple turning
            if (Math.abs(input.turn) > 0.1) {
                mario.rotation.y -= input.turn * 2 * dt;
            }

            // Basic animation (bob + lean)
            const bob = Math.sin(clock.getElapsedTime() * 10) * 0.02 * marioVelocity.length();
            mario.children[0].position.y = 0.6 + bob; // body bob
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const dt = Math.min(clock.getDelta(), 0.1);
                updateMarioPhysics(dt);

                // Camera follows Mario (third person style)
                const idealOffset = new THREE.Vector3(0, 3, 5).applyQuaternion(mario.quaternion);
                camera.position.lerp(mario.position.clone().add(idealOffset), 0.1);
                camera.lookAt(mario.position.clone().add(new THREE.Vector3(0, 1.2, 0)));

                renderer.render(scene, camera);
            });
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
