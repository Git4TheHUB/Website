<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swarm</title>
<style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
}
#bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>
<img id="bg" src="https://i.redd.it/brvc63j20c751.gif">
<script>
let dvdWindows = [];
let screenStream = null;

// required click for capture
document.addEventListener("click", async () => {
    if (screenStream) return;
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        window._stream = screenStream;
        // delay start 5s AFTER permission
        setTimeout(startSystem, 5000);
    } catch {
        alert("Screen capture required.");
    }
}, { once: true });

function spawnWindow() {
    const w = 200;
    const h = 120;
    const win = window.open("", "", `width=${w},height=${h}`);
    if (!win) return;
    dvdWindows.push(win);
    win.document.write(`
    <html>
    <head>
    <style>
        body,html { margin:0; overflow:hidden; background:black; }
        video {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:cover;
        }
        img {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:contain;
            mix-blend-mode: screen;
            pointer-events:none;
        }
    </style>
    </head>
    <body>
        <video autoplay muted playsinline></video>
        <img src="https://i.redd.it/brvc63j20c751.gif">
        <script>
        let x = window.screenX;
        let y = window.screenY;
        let vx = 0;
        let vy = 0;
        const speed = 3.0; // slightly faster for better feel

        // LOCAL mouse tracking (this is the fix)
        let mx = x + window.outerWidth / 2;
        let my = y + window.outerHeight / 2;
        document.addEventListener("mousemove", (e) => {
            mx = e.screenX;
            my = e.screenY;
        });

        function loop() {
            // Use window CENTER for repulsion (this was the main bug)
            const centerX = x + window.outerWidth / 2;
            const centerY = y + window.outerHeight / 2;

            // vector away from mouse (only when mouse is over this window)
            let dx = centerX - mx;
            let dy = centerY - my;
            let dist = Math.sqrt(dx*dx + dy*dy) || 1;

            // normalize + push away (stronger force when close)
            const force = 0.8;
            vx += (dx / dist) * force;
            vy += (dy / dist) * force;

            // dampening
            vx *= 0.90;
            vy *= 0.90;

            x += vx * speed;
            y += vy * speed;

            // keep on screen
            const sw = screen.availWidth;
            const sh = screen.availHeight;
            x = Math.max(0, Math.min(sw - window.outerWidth, x));
            y = Math.max(0, Math.min(sh - window.outerHeight, y));

            window.moveTo(Math.round(x), Math.round(y));
            requestAnimationFrame(loop);
        }

        // attach stream
        document.querySelector("video").srcObject = window.opener._stream;
        setTimeout(loop, 200);
        <\/script>
    </body>
    </html>
    `);
    win.document.close();
}

function startSystem() {
    // spawn 5 initially
    for (let i = 0; i < 5; i++) {
        setTimeout(spawnWindow, i * 200);
    }
    // spawn every 15 seconds
    setInterval(spawnWindow, 15000);
}
</script>
</body>

</head>
<body>

<img id="bg" src="https://www.crazygames.com/img/background.jpg" onerror="this.style.display='none'">
<img id="logo" src="https://cdn.crazygames.com/logo/crazygames-logo-white.png">

<button id="start">Start Swarm</button>

<script>
let screenStream = null;

document.getElementById("start").onclick = async () => {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });

        // spawn windows immediately (important for popup blockers)
        for (let i = 0; i < 5; i++) {
            spawnWindow();
        }

        // keep spawning more
        setInterval(spawnWindow, 10000);

    } catch (e) {
        alert("Screen capture permission is required.");
    }
};

function spawnWindow() {
    const w = 260;
    const h = 180;

    const win = window.open("", "", `width=${w},height=${h}`);
    if (!win) return;

    // basic HTML first
    win.document.write(`
<!DOCTYPE html>
<html>
<head>
<style>
body,html {
    margin:0;
    overflow:hidden;
    background:#000;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}
img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    mix-blend-mode:screen;
    pointer-events:none;
}
</style>
</head>
<body>
<video autoplay muted playsinline></video>
<img src="https://cdn.crazygames.com/logo/crazygames-logo-white.png">
</body>
</html>
    `);

    win.document.close();

    // wait until window is ready
    const interval = setInterval(() => {
        const video = win.document.querySelector("video");
        if (!video) return;

        video.srcObject = screenStream;
        video.play().catch(() => {});

        startMovement(win);
        clearInterval(interval);
    }, 100);
}

function startMovement(win) {
    let x = win.screenX;
    let y = win.screenY;

    let vx = (Math.random() - 0.5) * 6;
    let vy = (Math.random() - 0.5) * 6;

    function loop() {
        try {
            x += vx;
            y += vy;

            const sw = screen.availWidth;
            const sh = screen.availHeight;

            if (x <= 0 || x >= sw - win.outerWidth) vx *= -1;
            if (y <= 0 || y >= sh - win.outerHeight) vy *= -1;

            win.moveTo(x, y);
            win.requestAnimationFrame(loop);
        } catch {
            // window closed
        }
    }

    loop();
}
</script>
</body>
</html><img id="bg" src="https://i.redd.it/brvc63j20c751.gif" onerror="this.style.display='none'">

<div id="ui">
    <h1>SWARM PROTOCOL</h1>
    <p>KEEP MOUSE MOVING ON THIS SCREEN</p>
    <button id="start">LAUNCH</button>
</div>

<script>
const TARGET_URL = "https://www.crazygames.com";
const MAX_WINDOWS = 5; // Kept lower for better browser performance
const WIN_SIZE = 300;  // All windows will be exactly 300x300

let swarm = [];
let mx = -9999, my = -9999;

// Track mouse position globally on the main screen
window.addEventListener('mousemove', (e) => {
    mx = e.screenX;
    my = e.screenY;
});

// Hide mouse coordinates if we leave the main window so they don't get stuck
window.addEventListener('mouseout', () => {
    mx = -9999;
    my = -9999;
});

document.getElementById("start").onclick = function() {
    this.parentElement.style.display = "none";
    
    // Spawn initial windows
    for(let i=0; i<3; i++) setTimeout(spawn, i * 300);
    setInterval(spawn, 8000);
    
    // Start physics engine
    requestAnimationFrame(updatePhysics);
};

function spawn() {
    // Clear oldest to prevent lagging out the system
    if (swarm.length >= MAX_WINDOWS) {
        let oldest = swarm.shift();
        try { if (oldest.ref && !oldest.ref.closed) oldest.ref.close(); } catch(e) {}
    }

    const startX = Math.random() * (screen.availWidth - WIN_SIZE);
    const startY = Math.random() * (screen.availHeight - WIN_SIZE);

    const winRef = window.open(TARGET_URL, `win_${Date.now()}`, `width=${WIN_SIZE},height=${WIN_SIZE},left=${startX},top=${startY},menubar=no,toolbar=no,location=no,status=no`);
    
    if (winRef) {
        swarm.push({
            ref: winRef,
            x: startX,
            y: startY,
            vx: (Math.random() - 0.5) * 30, // Higher initial speed
            vy: (Math.random() - 0.5) * 30
        });
    } else {
        console.warn("Popup blocked!");
    }
}

function updatePhysics() {
    swarm.forEach((p, index) => {
        // Safely check if window was closed by the user
        try {
            if (p.ref.closed) {
                swarm.splice(index, 1);
                return;
            }
        } catch(e) {}

        // Calculate center of the specific popup
        const cx = p.x + (WIN_SIZE / 2);
        const cy = p.y + (WIN_SIZE / 2);

        // Calculate distance to mouse
        const dx = cx - mx;
        const dy = cy - my;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;

        // AGGRESSIVE FLEE LOGIC
        // If mouse is within 600 pixels (massive radius), push away instantly
        if (dist < 600) {
            const power = (600 - dist) / 600;
            p.vx += (dx / dist) * power * 40; // Extremely strong push
            p.vy += (dy / dist) * power * 40;
        }

        // Apply friction so they eventually stop if left alone
        p.vx *= 0.90;
        p.vy *= 0.90;

        // Hard speed cap so they don't break the physics engine
        const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if (speed > 60) {
            p.vx = (p.vx / speed) * 60;
            p.vy = (p.vy / speed) * 60;
        }

        // Apply velocity to position
        p.x += p.vx;
        p.y += p.vy;

        // Screen boundaries (perfect bounce)
        const sw = screen.availWidth;
        const sh = screen.availHeight;

        if (p.x <= 0) { p.x = 0; p.vx *= -1.5; } // Bounces back harder when hitting walls
        if (p.x >= sw - WIN_SIZE) { p.x = sw - WIN_SIZE; p.vx *= -1.5; }
        if (p.y <= 0) { p.y = 0; p.vy *= -1.5; }
        if (p.y >= sh - WIN_SIZE) { p.y = sh - WIN_SIZE; p.vy *= -1.5; }

        // Move the window
        try {
            p.ref.moveTo(Math.round(p.x), Math.round(p.y));
        } catch(e) {}
    });

    requestAnimationFrame(updatePhysics);
}
</script>
</body>
