<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crazy Swarm</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0a0a;
    font-family: system-ui, sans-serif;
    color: white;
}
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.15;
}
#logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    z-index: 10;
    filter: drop-shadow(0 0 30px #ff00ff);
}
#start {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: #ff00ff;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<img id="bg" src="https://www.crazygames.com/img/background.jpg" onerror="this.style.display='none'">
<img id="logo" src="https://cdn.crazygames.com/logo/crazygames-logo-white.png">

<button id="start">Start Swarm</button>

<script>
let screenStream = null;

document.getElementById("start").onclick = async () => {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });

        // spawn windows immediately (important for popup blockers)
        for (let i = 0; i < 5; i++) {
            spawnWindow();
        }

        // keep spawning more
        setInterval(spawnWindow, 10000);

    } catch (e) {
        alert("Screen capture permission is required.");
    }
};

function spawnWindow() {
    const w = 260;
    const h = 180;

    const win = window.open("", "", `width=${w},height=${h}`);
    if (!win) return;

    // basic HTML first
    win.document.write(`
<!DOCTYPE html>
<html>
<head>
<style>
body,html {
    margin:0;
    overflow:hidden;
    background:#000;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}
img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    mix-blend-mode:screen;
    pointer-events:none;
}
</style>
</head>
<body>
<video autoplay muted playsinline></video>
<img src="https://cdn.crazygames.com/logo/crazygames-logo-white.png">
</body>
</html>
    `);

    win.document.close();

    // wait until window is ready
    const interval = setInterval(() => {
        const video = win.document.querySelector("video");
        if (!video) return;

        video.srcObject = screenStream;
        video.play().catch(() => {});

        startMovement(win);
        clearInterval(interval);
    }, 100);
}

function startMovement(win) {
    let x = win.screenX;
    let y = win.screenY;

    let vx = (Math.random() - 0.5) * 6;
    let vy = (Math.random() - 0.5) * 6;

    function loop() {
        try {
            x += vx;
            y += vy;

            const sw = screen.availWidth;
            const sh = screen.availHeight;

            if (x <= 0 || x >= sw - win.outerWidth) vx *= -1;
            if (y <= 0 || y >= sh - win.outerHeight) vy *= -1;

            win.moveTo(x, y);
            win.requestAnimationFrame(loop);
        } catch {
            // window closed
        }
    }

    loop();
}
</script>
</body>
</html>
