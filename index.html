<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms MR - Level 0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(15, 15, 20, 0.9); color: #ddd; padding: 15px; 
            border-radius: 8px; width: 340px; border: 1px solid rgba(255,255,255,0.1);
        }
        button, input[type="range"] { margin: 8px 0; width: 100%; }
        button { background: #ca8a04; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #a16207; }
        #xrButton {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 16px 32px; font-size: 17px; font-weight: bold; background: #ca8a04; color: white;
            border: none; border-radius: 8px; cursor: pointer; z-index: 200;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="color:#fbbf24; margin-top:0;">Backrooms Level 0</h2>
        <button id="btnClear">Reset Scene</button>
        <div style="font-size:12px; color:#aaa; margin-top:10px;">
            R-Grip: Toggle Flashlight<br>
            L-Trigger: Add Wall Nodes
        </div>
    </div>

    <button id="xrButton">ENTER THE BACKROOMS</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.min.js"></script>

    <script>
        let scene, camera, renderer, clock;
        let modelGroup, flashlight;
        let isFlashlightOn = true;
        let controllerL, controllerR;

        // Replace these URLs with your GitHub raw links
        const MODEL_URL = 'https://raw.githubusercontent.com/Git4TheHUB/Website/refs/heads/main/scene.gltf';
        const TEXTURE_BASE = 'https://raw.githubusercontent.com/Gut4TheHub/Website/refs/heads/main/Piece1_baseColor.png';

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x554433, 10, 70);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(2, 1.6, 3); // Spawn position

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffeecc, 0.65));
            const hemi = new THREE.HemisphereLight(0xffeecc, 0x332211, 0.4);
            scene.add(hemi);

            loadModel();
            setupUI();
        }

        function loadModel() {
            const loader = new THREE.GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                modelGroup = gltf.scene;
                
                // Apply your textures to the model
                modelGroup.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;

                        if (child.material) {
                            // You can assign specific textures based on material name if needed
                            if (child.material.name.toLowerCase().includes('floor') || child.material.name.toLowerCase().includes('carpet')) {
                                child.material.map = new THREE.TextureLoader().load(TEXTURE_BASE + 'NewCarpet_baseColor.png');
                            }
                            if (child.material.name.toLowerCase().includes('ceiling')) {
                                child.material.map = new THREE.TextureLoader().load(TEXTURE_BASE + 'CeilingTile_baseColor.png');
                            }
                            if (child.material.name.toLowerCase().includes('wall')) {
                                child.material.map = new THREE.TextureLoader().load(TEXTURE_BASE + 'IMG_1598.jpg');
                            }
                            child.material.needsUpdate = true;
                        }
                    }
                });

                scene.add(modelGroup);
                console.log("Backrooms model loaded successfully");
            }, undefined, (err) => {
                console.error("Model load error:", err);
            });
        }

        function setupUI() {
            document.getElementById('btnClear').addEventListener('click', () => {
                if (modelGroup) modelGroup.position.set(0, 0, 0);
            });

            const xrBtn = document.getElementById('xrButton');
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-ar').then(supported => {
                    if (supported) xrBtn.addEventListener('click', startXR);
                });
            }
        }

        async function startXR() {
            document.getElementById('xrButton').style.display = 'none';
            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor']
                });
                renderer.xr.setSession(session);
                setupControllers();
                animate();
            } catch (e) {
                alert("Failed to start AR: " + e.message);
            }
        }

        function setupControllers() {
            controllerL = renderer.xr.getController(0);
            controllerR = renderer.xr.getController(1);
            scene.add(controllerL, controllerR);

            // Flashlight
            flashlight = new THREE.SpotLight(0xffeebb, 6, 35, Math.PI / 3.5, 0.8, 2);
            flashlight.castShadow = true;
            flashlight.shadow.mapSize.set(1024, 1024);
            controllerR.add(flashlight);

            controllerR.addEventListener('squeezestart', () => {
                isFlashlightOn = !isFlashlightOn;
                flashlight.intensity = isFlashlightOn ? 6 : 0;
            });
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                const time = clock.getElapsedTime();

                // Subtle old film / VHS effect
                if (modelGroup) {
                    modelGroup.traverse(child => {
                        if (child.material && child.material.map) {
                            child.material.map.offset.y = (time * 0.04) % 1;
                        }
                    });
                }

                renderer.render(scene, camera);
            });
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onResize);
    </script>
</body>
</html>
