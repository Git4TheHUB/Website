<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screen Bouncers</title>

<style>
body, html {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:system-ui;
}
</style>
</head>

<body>

<div>
    HOLD E = FASTER<br>
    HOLD Q = SLOWER<br>
    (Click once to allow screen capture)
</div>

<script>
let dvdWindows = [];
let screenStream = null;

let holdingE = false;
let holdingQ = false;

// MUST be triggered by user interaction
async function startCapture() {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: true
        });
        spawnInitial();
    } catch (e) {
        alert("Screen capture denied.");
    }
}

document.body.addEventListener("click", startCapture, { once: true });

function spawnDvdWindow() {
    const width = 200;
    const height = 120;

    const win = window.open("", "", `width=${width},height=${height}`);
    if (!win) return;

    dvdWindows.push(win);

    win.document.write(`
    <html>
    <head>
    <style>
        body,html {
            margin:0;
            overflow:hidden;
            background:black;
        }

        video {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:cover;
        }

        img {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:contain;
            mix-blend-mode: screen;
            pointer-events:none;
        }
    </style>
    </head>

    <body>
        <video autoplay muted playsinline></video>
        <img src="https://i.redd.it/brvc63j20c751.gif">

        <script>
        let vx = 0.8;
        let vy = 0.6;

        window.setSpeed = (m) => {
            vx *= m;
            vy *= m;
        };

        function bounce() {
            let x = window.screenX;
            let y = window.screenY;

            const w = window.outerWidth;
            const h = window.outerHeight;

            x += vx;
            y += vy;

            const sw = screen.availWidth;
            const sh = screen.availHeight;

            if (x <= 0 || x + w >= sw) vx *= -1;
            if (y <= 0 || y + h >= sh) vy *= -1;

            window.moveTo(x, y);
            requestAnimationFrame(bounce);
        }

        // receive stream from opener
        const stream = window.opener._stream;
        if (stream) {
            document.querySelector("video").srcObject = stream;
        }

        setTimeout(() => {
            window.moveTo(
                Math.random() * (screen.availWidth - ${width}),
                Math.random() * (screen.availHeight - ${height})
            );
            bounce();
        }, 200);

        <\/script>
    </body>
    </html>
    `);

    win.document.close();
}

function spawnInitial() {
    // expose stream to popups
    window._stream = screenStream;

    for (let i = 0; i < 5; i++) {
        setTimeout(spawnDvdWindow, i * 150);
    }
}

// HOLD controls
document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "e") holdingE = true;
    if (e.key.toLowerCase() === "q") holdingQ = true;
});

document.addEventListener("keyup", (e) => {
    if (e.key.toLowerCase() === "e") holdingE = false;
    if (e.key.toLowerCase() === "q") holdingQ = false;
});

// continuous speed adjust
setInterval(() => {
    if (holdingE) {
        dvdWindows.forEach(w => !w.closed && w.setSpeed(1.08));
    }
    if (holdingQ) {
        dvdWindows.forEach(w => !w.closed && w.setSpeed(0.92));
    }
}, 50);
</script>

</body>
</html>
