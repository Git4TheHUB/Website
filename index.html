<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Verity Mixed Reality</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let touches pass through to WebXR */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 40px;
            z-index: 10;
        }
        #trigger-btn {
            pointer-events: auto; /* Make button clickable */
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Hidden until AR starts */
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="overlay">
        <button id="trigger-btn">Trigger Verity Intro</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let camera, scene, renderer;
        let hand1, hand2;
        let entityBox, veritySphere;
        let introPlaying = false;
        
        // Dictionary to store real-world meshes mapped by WebXR
        const roomMeshes = new Map();

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 2. Lighting
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. Request AR Session with specific features
            const arButton = ARButton.createButton(renderer, {
                requiredFeatures: ['local-floor', 'hand-tracking', 'dom-overlay'],
                optionalFeatures: ['mesh-detection'],
                domOverlay: { root: document.getElementById('overlay') }
            });
            document.body.appendChild(arButton);

            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('trigger-btn').style.display = 'block';
            });
            renderer.xr.addEventListener('sessionend', () => {
                document.getElementById('trigger-btn').style.display = 'none';
            });

            // 5. Hand Tracking Setup
            const handModelFactory = new XRHandModelFactory();
            
            hand1 = renderer.xr.getHand(0);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh"));
            scene.add(hand1);

            hand2 = renderer.xr.getHand(1);
            hand2.add(handModelFactory.createHandModel(hand2, "mesh"));
            scene.add(hand2);

            // 6. Setup Verity Intro Objects (Hidden initially)
            setupVerityIntro();

            // 7. Event Listeners
            document.getElementById('trigger-btn').addEventListener('click', startIntro);
            window.addEventListener('resize', onWindowResize);
        }

        function setupVerityIntro() {
            // The Box
            const boxGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, wireframe: false });
            entityBox = new THREE.Mesh(boxGeo, boxMat);
            entityBox.visible = false;
            scene.add(entityBox);

            // The Entity (Sphere)
            const sphereGeo = new THREE.SphereGeometry(0.15, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
            veritySphere = new THREE.Mesh(sphereGeo, sphereMat);
            veritySphere.visible = false;
            scene.add(veritySphere);
        }

        function startIntro() {
            if (introPlaying) return;
            introPlaying = true;

            // Get camera position to spawn the box in front of the user
            const userPosition = new THREE.Vector3();
            camera.getWorldPosition(userPosition);
            const userDirection = new THREE.Vector3();
            camera.getWorldDirection(userDirection);

            // Position box 1.5 meters in front, slightly above eye level
            entityBox.position.copy(userPosition).add(userDirection.multiplyScalar(1.5));
            entityBox.position.y += 0.5;
            entityBox.visible = true;

            // Position sphere inside the box
            veritySphere.position.copy(entityBox.position);
            veritySphere.visible = true;

            // Simple Animation Sequence (Box floats, sphere drops)
            let time = 0;
            const dropInterval = setInterval(() => {
                time += 0.016; // rough 60fps delta
                
                // Float the box slightly
                entityBox.rotation.y += 0.02;
                entityBox.rotation.x += 0.01;

                if (time > 2.0) { // After 2 seconds, drop the sphere
                    if (veritySphere.position.y > 0.15) { // Drop until it hits the floor (y=0.15 is radius)
                        veritySphere.position.y -= 0.05; // Gravity simulation
                    } else {
                        // Impact! Bounce slightly
                        veritySphere.position.y = 0.15;
                        clearInterval(dropInterval);
                        introPlaying = false;
                    }
                }
            }, 16);
        }

        function processRealWorldMeshes(frame) {
            // The mesh-detection API is highly experimental.
            // This reads the raw geometry data from the headset's spatial mapping.
            if (!frame.detectedMeshes) return;

            frame.detectedMeshes.forEach(xrMesh => {
                let threeMesh = roomMeshes.get(xrMesh);

                if (!threeMesh) {
                    // Create a new Three.js mesh for new physical geometry
                    const geometry = new THREE.BufferGeometry();
                    // Voxel-style material
                    const material = new THREE.MeshBasicMaterial({ 
                        color: 0x00aaff, 
                        wireframe: true, // Set to true to see the raw geometry scan
                        transparent: true,
                        opacity: 0.3
                    });
                    threeMesh = new THREE.Mesh(geometry, material);
                    scene.add(threeMesh);
                    roomMeshes.set(xrMesh, threeMesh);
                }

                // Update the geometry vertices as the headset scans the room
                const vertices = xrMesh.vertices;
                const indices = xrMesh.indices;

                threeMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                if (indices) {
                    threeMesh.geometry.setIndex(new THREE.BufferAttribute(indices, 1));
                }
                
                // Update transformation matrix to lock it to the real world
                const transform = frame.getPose(xrMesh.semanticSpace, renderer.xr.getReferenceSpace()).transform;
                threeMesh.matrix.fromArray(transform.matrix);
                threeMesh.matrixAutoUpdate = false;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop((timestamp, frame) => {
                if (frame) {
                    // Process real-time environment meshing
                    processRealWorldMeshes(frame);
                }
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
