<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms MR - Level 0</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; user-select: none; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(10, 15, 20, 0.85); color: #e2e8f0; 
            padding: 15px; border-radius: 8px; width: 320px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            max-height: 90vh; overflow-y: auto;
        }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #fbbf24; text-transform: uppercase; }
        .slider-group { margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; }
        label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #94a3b8; }
        input[type="range"] { width: 100%; accent-color: #fbbf24; }
        button { 
            background: #ca8a04; color: white; border: none; border-radius: 4px; 
            padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #a16207; }
        
        #xrButton {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200;
            padding: 15px 30px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            background: #ca8a04; color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Level 0 Override</h2>

        <h2>Spatial Setup</h2>
        <div class="slider-group">
            <label><span>Room Width (X)</span><span id="valW">12.0m</span></label>
            <input type="range" id="slW" min="6" max="30" step="0.5" value="12">
        </div>
        <div class="slider-group">
            <label><span>Room Length (Z)</span><span id="valL">12.0m</span></label>
            <input type="range" id="slL" min="6" max="30" step="0.5" value="12">
        </div>
        <div class="slider-group">
            <label><span>Ceiling Height</span><span id="valH">2.8m</span></label>
            <input type="range" id="slH" min="2.4" max="4" step="0.1" value="2.8">
        </div>
        <div class="slider-group">
            <label><span>Wall Opacity</span><span id="valO">0.98</span></label>
            <input type="range" id="slO" min="0.6" max="1" step="0.01" value="0.98">
        </div>

        <button id="btnClear">Reset Geometry</button>
        
        <div style="margin-top:10px; font-size:11px; color:#64748b;">
            <strong>Backrooms Controls:</strong><br>
            • R-Grip: Toggle Flashlight<br>
            • L-Trigger: Place Boundary Nodes (Advanced Mode)<br>
            <strong>Atmosphere:</strong> Endless yellow monotony
        </div>
    </div>

    <button id="xrButton">Enter The Backrooms</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        // --- GLOBALS ---
        let scene, camera, renderer, audioCtx;
        let roomGroup, roomDimensions = { w: 12, h: 2.8, l: 12 };
        let surfaceOpacity = 0.98;
        let clock = new THREE.Clock();

        let controllerL, controllerR;
        let flashlight;
        let isFlashlightOn = false; // OFF by default

        let drawModeActive = true; // Advanced room mode by default

        let boundaryNodes = [];
        let nodeVisuals = [];

        // Textures
        let wallTexture, ceilingTexture, noiseNormalMap;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x8b6f47, 8, 55);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 100);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xfff4c8, 0.45));

            generateProceduralTextures();
            buildRoomBoundaries();
            setupFlickeringLights();

            // UI Listeners
            document.getElementById('slW').addEventListener('input', e => { 
                roomDimensions.w = parseFloat(e.target.value); 
                document.getElementById('valW').innerText = roomDimensions.w.toFixed(1)+'m'; 
                updateRoom(); 
            });
            document.getElementById('slL').addEventListener('input', e => { 
                roomDimensions.l = parseFloat(e.target.value); 
                document.getElementById('valL').innerText = roomDimensions.l.toFixed(1)+'m'; 
                updateRoom(); 
            });
            document.getElementById('slH').addEventListener('input', e => { 
                roomDimensions.h = parseFloat(e.target.value); 
                document.getElementById('valH').innerText = roomDimensions.h.toFixed(1)+'m'; 
                updateRoom(); 
            });
            document.getElementById('slO').addEventListener('input', e => { 
                surfaceOpacity = parseFloat(e.target.value); 
                document.getElementById('valO').innerText = surfaceOpacity.toFixed(2); 
                updateRoom(); 
            });
            
            document.getElementById('btnClear').addEventListener('click', resetGeometry);

            const btnXR = document.getElementById('xrButton');
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-ar').then(sup => {
                    if (sup) btnXR.addEventListener('click', startXR);
                });
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function generateProceduralTextures() {
            const nCanv = document.createElement('canvas');
            nCanv.width = nCanv.height = 512;
            const nCtx = nCanv.getContext('2d');
            const imgData = nCtx.createImageData(512, 512);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const val = 210 + Math.random() * 45;
                imgData.data[i] = val;
                imgData.data[i+1] = val * 0.96;
                imgData.data[i+2] = val * 0.82;
                imgData.data[i+3] = 255;
            }
            nCtx.putImageData(imgData, 0, 0);
            noiseNormalMap = new THREE.CanvasTexture(nCanv);
            noiseNormalMap.wrapS = noiseNormalMap.wrapT = THREE.RepeatWrapping;

            wallTexture = new THREE.TextureLoader().load('/home/workdir/attachments/IMG_1598.jpg', tex => {
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(8, 5);
            });

            ceilingTexture = new THREE.TextureLoader().load('/home/workdir/attachments/IMG_1599.jpg', tex => {
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(16, 16);
            });
        }

        function setupFlickeringLights() {
            for (let i = 0; i < 8; i++) {
                const light = new THREE.PointLight(0xfff4c8, 0.7, 30);
                light.position.set(
                    (Math.random() - 0.5) * 18,
                    roomDimensions.h - 0.3,
                    (Math.random() - 0.5) * 18
                );
                scene.add(light);
                light.userData = { baseIntensity: 0.7, offset: Math.random() * 20 };
            }
        }

        function buildRoomBoundaries() {
            if (roomGroup) scene.remove(roomGroup);
            roomGroup = new THREE.Group();

            const wallMat = new THREE.MeshStandardMaterial({ 
                map: wallTexture,
                normalMap: noiseNormalMap,
                normalScale: new THREE.Vector2(1.5, 1.5),
                roughness: 0.85,
                metalness: 0.1,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: surfaceOpacity,
                depthWrite: true
            });

            const ceilingMat = new THREE.MeshStandardMaterial({ 
                map: ceilingTexture,
                roughness: 0.9,
                side: THREE.DoubleSide
            });

            const {w, h, l} = roomDimensions;

            const makeWall = (ww, hh, px, py, pz, rotX, rotY) => {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(ww, hh), wallMat);
                mesh.position.set(px, py, pz);
                mesh.rotation.set(rotX, rotY, 0);
                mesh.receiveShadow = true;
                mesh.castShadow = true;
                mesh.userData = { isWall: true, normal: new THREE.Vector3(0,0,1).applyEuler(mesh.rotation).normalize() };
                roomGroup.add(mesh);
            };

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(w * 2.5, l * 2.5), wallMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0.005;
            roomGroup.add(floor);

            // Ceiling
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w * 2.5, l * 2.5), ceilingMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = h;
            roomGroup.add(ceiling);

            // Walls
            makeWall(w * 2.5, h, 0, h/2, -l * 1.25, 0, 0);     
            makeWall(w * 2.5, h, 0, h/2, l * 1.25, 0, Math.PI); 
            makeWall(l * 2.5, h, -w * 1.25, h/2, 0, 0, Math.PI/2); 
            makeWall(l * 2.5, h, w * 1.25, h/2, 0, 0, -Math.PI/2); 

            scene.add(roomGroup);
        }

        function updateRoom() {
            buildRoomBoundaries();
        }

        function resetGeometry() {
            boundaryNodes = [];
            nodeVisuals.forEach(n => scene.remove(n));
            nodeVisuals = [];
            buildRoomBoundaries();
        }

        async function startXR() {
            document.getElementById('xrButton').style.display = 'none';
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
                renderer.xr.setSession(session);
                setupControllers();
                animate();
            } catch (err) {
                console.error(err);
            }
        }

        function setupControllers() {
            controllerL = renderer.xr.getController(0); scene.add(controllerL);
            controllerR = renderer.xr.getController(1); scene.add(controllerR);

            // Flashlight (off by default)
            flashlight = new THREE.SpotLight(0xfff4c8, 0, 40, Math.PI / 3.5, 0.7, 2.2);
            flashlight.castShadow = true;
            flashlight.shadow.mapSize.width = 1024;
            flashlight.shadow.mapSize.height = 1024;
            controllerR.add(flashlight);

            controllerR.addEventListener('squeezestart', () => {
                isFlashlightOn = !isFlashlightOn;
                flashlight.intensity = isFlashlightOn ? 4.5 : 0;
            });

            controllerL.addEventListener('selectstart', () => {
                if (drawModeActive) {
                    handleDrawModeCast();
                }
            });
        }

        function handleDrawModeCast() {
            const pos = new THREE.Vector3();
            controllerL.matrixWorld.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
            const dir = new THREE.Vector3(0, -1, 0).applyQuaternion(controllerL.quaternion); // bias toward floor

            const raycaster = new THREE.Raycaster(pos, dir.normalize());
            const intersects = raycaster.intersectObjects(roomGroup.children, true);
            
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                boundaryNodes.push(pt.clone());
                
                const marker = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.06, 0.15, 12), 
                    new THREE.MeshBasicMaterial({color: 0xfbbf24})
                );
                marker.position.copy(pt);
                marker.rotation.x = Math.PI / 2;
                scene.add(marker);
                nodeVisuals.push(marker);
            }
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const dt = Math.min(clock.getDelta(), 0.1);
                const time = clock.getElapsedTime();

                // Light flicker
                scene.children.forEach(child => {
                    if (child.isPointLight && child.userData.baseIntensity) {
                        child.intensity = child.userData.baseIntensity + Math.sin(time * 12 + child.userData.offset) * 0.35;
                    }
                });

                if (wallTexture) {
                    wallTexture.offset.y = (time * 0.08) % 1;
                }

                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
