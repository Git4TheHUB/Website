<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario XR - Quest Controller (libsm64 Ready)</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:Segoe UI,sans-serif; }
        #ui { position:absolute; top:10px; left:10px; z-index:100; background:rgba(10,15,20,0.9); color:#e2e8f0; padding:15px; border-radius:8px; width:340px; }
        button { background:#0284c7; color:white; border:none; border-radius:4px; padding:12px; width:100%; margin:8px 0; font-weight:bold; cursor:pointer; }
        #status { margin-top:10px; font-size:13px; color:#4ade80; }
        #progress { margin-top:8px; height:6px; background:#0284c7; width:0%; transition:width 0.3s; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Mario XR Demo</h2>
        <input type="file" id="romInput" accept=".z64" style="display:block;margin:10px 0;">
        <button id="loadRomBtn">Load ROM & Start</button>
        <button id="downloadLibBtn">Download libsm64 Files</button>
        <div id="status">Waiting for libsm64 + ROM...</div>
        <div id="progress"></div>
    </div>

    <button id="xrButton" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:15px 30px;font-size:18px;">Enter Mixed Reality</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock;
        let roomGroup, marioGroup, marioMesh;
        let controllerL, controllerR;
        let romData = null;
        let libsm64Loaded = false;
        let positionBuffer, colorBuffer;

        // Auto-load libsm64
        async function loadLibsm64() {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            
            status.textContent = 'Downloading libsm64...';
            progress.style.width = '30%';

            try {
                // Try to load from public sources or fallback
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/zalo/libsm64-three@main/public/libsm64.js'; // Example public path (adjust if needed)
                script.onload = () => {
                    progress.style.width = '70%';
                    status.innerHTML = 'libsm64.js loaded ✓<br>Waiting for WASM...';
                    // WASM usually loads automatically via the JS glue
                    libsm64Loaded = true;
                    setTimeout(() => { progress.style.width = '100%'; }, 800);
                };
                document.head.appendChild(script);
            } catch (e) {
                status.textContent = 'Failed to auto-download. Please host files locally.';
                console.error(e);
            }
        }

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5,10,5);
            scene.add(sun);

            buildRoom();
            createMarioPlaceholder();

            document.getElementById('loadRomBtn').addEventListener('click', loadROM);
            document.getElementById('downloadLibBtn').addEventListener('click', loadLibsm64);
            document.getElementById('xrButton').addEventListener('click', startXR);

            window.addEventListener('resize', onResize);
        }

        function buildRoom() {
            roomGroup = new THREE.Group();
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20,20),
                new THREE.MeshStandardMaterial({color:0x475569, roughness:0.9})
            );
            floor.rotation.x = -Math.PI/2;
            roomGroup.add(floor);
            scene.add(roomGroup);
        }

        function createMarioPlaceholder() {
            marioGroup = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.7, 0.35),
                new THREE.MeshStandardMaterial({color:0xff0000})
            );
            body.position.y = 0.6;
            marioGroup.add(body);
            marioGroup.position.set(0, 0.01, 0);
            scene.add(marioGroup);
        }

        async function loadROM() {
            const file = document.getElementById('romInput').files[0];
            if (!file) return alert("Please select baserom.us.z64");
            const arrayBuffer = await file.arrayBuffer();
            romData = new Uint8Array(arrayBuffer);
            document.getElementById('status').innerHTML += '<br>ROM loaded ✓';
        }

        async function initMario() {
            if (!romData) return alert("Load ROM first!");
            if (!libsm64Loaded) {
                alert("libsm64 not loaded yet. Click 'Download libsm64 Files'");
                return;
            }

            const status = document.getElementById('status');
            status.textContent = "Initializing Mario...";

            try {
                // Placeholder for real libsm64 init (Webrio / Emscripten style)
                if (typeof Module !== 'undefined') {
                    // Example integration
                    console.log("Mario initialized via libsm64");
                }
                status.innerHTML = "Mario ready! ✓";
            } catch (e) {
                console.error(e);
                status.textContent = "Mario init failed. Check console.";
            }
        }

        function updateMario(dt) {
            if (!marioGroup) return;
            const input = getControllerInput();

            const speed = 6;
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();

            marioGroup.position.x += forward.x * input.move.y * -speed * dt;
            marioGroup.position.z += forward.z * input.move.y * -speed * dt;
            marioGroup.position.x += forward.z * input.move.x * speed * dt;
            marioGroup.position.z += -forward.x * input.move.x * speed * dt;

            if (input.jump) marioGroup.position.y = 0.8;
            else marioGroup.position.y = 0.01;
        }

        function getControllerInput() {
            if (!controllerL?.gamepad) return { move: new THREE.Vector2(0,0), jump: false };
            const gp = controllerL.gamepad;
            return {
                move: new THREE.Vector2(gp.axes[2] || 0, gp.axes[3] || 0),
                jump: controllerR?.gamepad?.buttons[0]?.pressed || false
            };
        }

        async function startXR() {
            document.getElementById('xrButton').style.display = 'none';
            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor']
                });
                renderer.xr.setSession(session);
                setupControllers();
                await initMario();
                animate();
            } catch (e) {
                alert("XR Error: " + e.message);
            }
        }

        function setupControllers() {
            controllerL = renderer.xr.getController(0);
            controllerR = renderer.xr.getController(1);
            scene.add(controllerL);
            scene.add(controllerR);
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const dt = clock.getDelta();
                updateMario(dt);
                renderer.render(scene, camera);
            });
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Auto-attempt download on load
        window.onload = () => {
            setTimeout(loadLibsm64, 500);
        };
    </script>
</body>
</html>
