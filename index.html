<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest Controller</title>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; }
        canvas { display:block; }
    </style>
</head>
<body>
    <div style="position:absolute;top:10px;left:10px;">Quest → Roblox Controller (Pythonista)</div>
    <canvas id="game"></canvas>

    <script src="https://unpkg.com/netplayjs@0.4.1/dist/netplay.js"></script>
    <script>
        const RELAY_URL = "http://192.168.1.22:8080";  // ← Same IP as above

        class Controller extends netplayjs.Game {
            constructor() {
                super();
                this.state = {moveX:0, moveZ:0, lookX:0, lookY:0, jump:false, primaryAction:false};
            }

            tick(inputs) {
                for (let [_, input] of inputs) {
                    const k = input.keys || {};
                    const pads = navigator.getGamepads ? navigator.getGamepads() : [];

                    let mx = (k['KeyD']||0) - (k['KeyA']||0);
                    let mz = (k['KeyS']||0) - (k['KeyW']||0);
                    let lx = (k['ArrowRight']||0) - (k['ArrowLeft']||0);
                    let ly = (k['ArrowDown']||0) - (k['ArrowUp']||0);

                    // Quest Controller support
                    for (let pad of pads) {
                        if (pad && pad.axes) {
                            mx = pad.axes[0];
                            mz = pad.axes[1];
                            lx = pad.axes[2];
                            ly = pad.axes[3];
                            this.state.jump = pad.buttons[0].pressed;           // A button
                            this.state.primaryAction = pad.buttons[7].pressed; // Right trigger
                        }
                    }

                    this.state.moveX = mx;
                    this.state.moveZ = mz;
                    this.state.lookX = lx;
                    this.state.lookY = ly;

                    // Send to Pythonista
                    fetch(RELAY_URL, {
                        method: "POST",
                        body: JSON.stringify(this.state)
                    }).catch(() => {});
                }
            }

            draw(c) {
                const ctx = c.getContext("2d");
                ctx.fillStyle = "#111";
                ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = "#0f0";
                ctx.font = "24px monospace";
                ctx.fillText("🎮 Quest Controller Active", 50, 100);
            }
        }

        Controller.timestep = 1000/60;
        new netplayjs.RollbackWrapper(Controller).start();
    </script>
</body>
</html>
