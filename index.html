<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DVD Webcam Bouncer</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        height: 100vh;
        width: 100vw;
        color: white;
        font-family: 'Press Start 2P', system-ui;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
    }
    .info {
        text-align: center;
        font-size: 15px;
        line-height: 1.5;
    }
</style>
</head>
<body>

<div class="info">
    PRESS <strong>E</strong> → NEW BOUNCING WINDOW<br>
    PRESS <strong>+</strong> → FASTER<br>
    PRESS <strong>-</strong> → SLOWER
</div>

<script>
// Global list to control all windows
let dvdWindows = [];

// First request webcam on the main page (helps popups work in Chrome)
let mainStream = null;
navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        mainStream = stream; // keep stream alive
        console.log("Main page webcam ready");
    })
    .catch(err => {
        console.error("Main webcam error:", err);
    });

// Function to spawn one bouncing window
function spawnDvdWindow() {
    const width = 280;
    const height = 160;

    const dvdWin = window.open("", "dvdBouncer", 
        `width=${width},height=${height},left=300,top=200,resizable=no,scrollbars=no,menubar=no,toolbar=no,status=no`);

    if (!dvdWin) {
        alert("Popup blocked! Please allow popups for this page.");
        return;
    }

    dvdWindows.push(dvdWin);

    dvdWin.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>DVD</title>
        <style>
            body, html { margin:0; padding:0; overflow:hidden; background:black; }
            #webcam { width:100%; height:100%; object-fit:cover; display:block; }
        </style>
    </head>
    <body>
        <video id="webcam" autoplay playsinline muted></video>

        <script>
            let vx = 6.8;
            let vy = 4.9;
            let hue = 0;

            // Expose speed control functions to parent window
            window.setSpeed = function(multiplier) {
                vx *= multiplier;
                vy *= multiplier;
            };

            function changeColor() {
                hue = (hue + 45 + Math.random() * 90) % 360;
                document.documentElement.style.filter = 
                    \`hue-rotate(\${hue}deg) saturate(1.8) brightness(1.25)\`;
            }

            function bounce() {
                let x = window.screenX;
                let y = window.screenY;
                const w = window.outerWidth;
                const h = window.outerHeight;

                x += vx;
                y += vy;

                const screenW = screen.availWidth;
                const screenH = screen.availHeight;

                let bounced = false;
                if (x <= 0 || x + w >= screenW) { vx = -vx; bounced = true; }
                if (y <= 0 || y + h >= screenH) { vy = -vy; bounced = true; }

                if (bounced) changeColor();

                window.moveTo(Math.round(x), Math.round(y));

                // small random variation
                if (Math.random() < 0.03) {
                    vx += (Math.random() - 0.5) * 1.5;
                    vy += (Math.random() - 0.5) * 1.5;
                }

                requestAnimationFrame(bounce);
            }

            // Start webcam + bounce
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    document.getElementById('webcam').srcObject = stream;
                })
                .catch(() => {});

            setTimeout(() => {
                const startX = Math.random() * (screen.availWidth - ${width} - 100);
                const startY = Math.random() * (screen.availHeight - ${height} - 100);
                window.moveTo(startX, startY);
                bounce();
            }, 400);
        <\/script>
    </body>
    </html>`);

    dvdWin.document.close();
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'e') {
        spawnDvdWindow();
    }
    else if (key === '+') {
        // Speed up all windows
        dvdWindows.forEach(win => {
            if (!win.closed) win.setSpeed(1.25);
        });
    }
    else if (key === '-') {
        // Slow down all windows
        dvdWindows.forEach(win => {
            if (!win.closed) win.setSpeed(0.8);
        });
    }
});

// Auto spawn first window
window.onload = () => {
    setTimeout(() => {
        spawnDvdWindow();
    }, 600);
};
</script>

</body>
</html>
