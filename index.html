<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms MR - Level 0</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; user-select: none; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(10, 15, 20, 0.85); color: #e2e8f0; 
            padding: 15px; border-radius: 8px; width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            max-height: 90vh; overflow-y: auto;
        }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #fbbf24; text-transform: uppercase; }
        .slider-group { margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; }
        label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #94a3b8; }
        input[type="range"] { width: 100%; accent-color: #fbbf24; }
        button { 
            background: #ca8a04; color: white; border: none; border-radius: 4px; 
            padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #a16207; }
        
        #xrButton {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200;
            padding: 15px 30px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            background: #ca8a04; color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Level 0 - Advanced Geometry</h2>

        <h2>Spatial Setup</h2>
        <div class="slider-group">
            <label><span>Room Scale (X)</span><span id="valW">18.0m</span></label>
            <input type="range" id="slW" min="8" max="40" step="0.5" value="18">
        </div>
        <div class="slider-group">
            <label><span>Room Scale (Z)</span><span id="valL">18.0m</span></label>
            <input type="range" id="slL" min="8" max="40" step="0.5" value="18">
        </div>
        <div class="slider-group">
            <label><span>Ceiling Height</span><span id="valH">2.7m</span></label>
            <input type="range" id="slH" min="2.4" max="3.2" step="0.05" value="2.7">
        </div>

        <button id="btnClear">Reset All Geometry</button>
        
        <div style="margin-top:10px; font-size:11px; color:#64748b;">
            <strong>Controls:</strong><br>
            • R-Grip: Toggle Flashlight<br>
            • L-Trigger: Drop Wall Node (Advanced Mode)<br>
            <strong>Tip:</strong> Build complex mazes by placing multiple nodes
        </div>
    </div>

    <button id="xrButton">Enter The Backrooms</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        // --- GLOBALS ---
        let scene, camera, renderer;
        let roomGroup, roomDimensions = { w: 18, h: 2.7, l: 18 };
        let clock = new THREE.Clock();

        let controllerL, controllerR;
        let flashlight;
        let isFlashlightOn = false;

        let drawModeActive = true;
        let boundaryNodes = [];
        let nodeVisuals = [];
        let wallSegments = [];

        let wallTexture, ceilingTexture, noiseNormalMap;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x8b6f47, 6, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xfff4c8, 0.5));

            generateProceduralTextures();
            buildAdvancedRoom();

            document.getElementById('slW').addEventListener('input', e => { 
                roomDimensions.w = parseFloat(e.target.value); 
                document.getElementById('valW').innerText = roomDimensions.w.toFixed(1)+'m'; 
            });
            document.getElementById('slL').addEventListener('input', e => { 
                roomDimensions.l = parseFloat(e.target.value); 
                document.getElementById('valL').innerText = roomDimensions.l.toFixed(1)+'m'; 
            });
            document.getElementById('slH').addEventListener('input', e => { 
                roomDimensions.h = parseFloat(e.target.value); 
                document.getElementById('valH').innerText = roomDimensions.h.toFixed(2)+'m'; 
            });
            
            document.getElementById('btnClear').addEventListener('click', resetGeometry);

            const btnXR = document.getElementById('xrButton');
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-ar').then(sup => {
                    if (sup) btnXR.addEventListener('click', startXR);
                });
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function generateProceduralTextures() {
            // Noise
            const nCanv = document.createElement('canvas');
            nCanv.width = nCanv.height = 512;
            const nCtx = nCanv.getContext('2d');
            const imgData = nCtx.createImageData(512, 512);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const val = 205 + Math.random() * 50;
                imgData.data[i] = val; imgData.data[i+1] = val*0.95; imgData.data[i+2] = val*0.8; imgData.data[i+3] = 255;
            }
            nCtx.putImageData(imgData, 0, 0);
            noiseNormalMap = new THREE.CanvasTexture(nCanv);
            noiseNormalMap.wrapS = noiseNormalMap.wrapT = THREE.RepeatWrapping;

            wallTexture = new THREE.TextureLoader().load('/home/workdir/attachments/IMG_1598.jpg', tex => {
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(12, 6);
            });

            ceilingTexture = new THREE.TextureLoader().load('/home/workdir/attachments/IMG_1599.jpg', tex => {
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(24, 24);
            });
        }

        function buildAdvancedRoom() {
            if (roomGroup) scene.remove(roomGroup);
            roomGroup = new THREE.Group();
            wallSegments = [];

            const wallMat = new THREE.MeshStandardMaterial({ 
                map: wallTexture,
                normalMap: noiseNormalMap,
                normalScale: new THREE.Vector2(2.2, 2.2),
                roughness: 0.9,
                metalness: 0.05,
                side: THREE.DoubleSide,
                transparent: false, // 100% visible
                opacity: 1.0
            });

            const ceilingMat = new THREE.MeshStandardMaterial({ 
                map: ceilingTexture,
                roughness: 0.95,
                side: THREE.DoubleSide
            });

            const {w, h, l} = roomDimensions;

            // Large base floor and ceiling
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(w * 3, l * 3), wallMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0.01;
            roomGroup.add(floor);

            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w * 3, l * 3), ceilingMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = h;
            roomGroup.add(ceiling);

            // Outer walls
            const outerWallMat = wallMat.clone();
            const makeOuterWall = (width, height, x, z, rotY) => {
                const wall = new THREE.Mesh(new THREE.PlaneGeometry(width, height), outerWallMat);
                wall.position.set(x, h/2, z);
                wall.rotation.y = rotY;
                wall.receiveShadow = true;
                wall.castShadow = true;
                roomGroup.add(wall);
                return wall;
            };

            makeOuterWall(w * 3, h, 0, -l * 1.5, 0);
            makeOuterWall(w * 3, h, 0, l * 1.5, Math.PI);
            makeOuterWall(l * 3, h, -w * 1.5, 0, Math.PI / 2);
            makeOuterWall(l * 3, h, w * 1.5, 0, -Math.PI / 2);

            scene.add(roomGroup);
        }

        function resetGeometry() {
            boundaryNodes = [];
            nodeVisuals.forEach(n => scene.remove(n));
            nodeVisuals = [];
            wallSegments.forEach(w => scene.remove(w));
            wallSegments = [];
            buildAdvancedRoom();
        }

        async function startXR() {
            document.getElementById('xrButton').style.display = 'none';
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
                renderer.xr.setSession(session);
                setupControllers();
                animate();
            } catch (err) {
                console.error(err);
            }
        }

        function setupControllers() {
            controllerL = renderer.xr.getController(0); scene.add(controllerL);
            controllerR = renderer.xr.getController(1); scene.add(controllerR);

            flashlight = new THREE.SpotLight(0xfff4c8, 0, 45, Math.PI / 3.2, 0.75, 2);
            flashlight.castShadow = true;
            flashlight.shadow.mapSize.set(1024, 1024);
            controllerR.add(flashlight);

            controllerR.addEventListener('squeezestart', () => {
                isFlashlightOn = !isFlashlightOn;
                flashlight.intensity = isFlashlightOn ? 5 : 0;
            });

            controllerL.addEventListener('selectstart', () => {
                if (drawModeActive) handleDrawModeCast();
            });
        }

        function handleDrawModeCast() {
            const pos = new THREE.Vector3();
            controllerL.matrixWorld.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
            const dir = new THREE.Vector3(0, -0.6, -0.8).applyQuaternion(controllerL.quaternion).normalize();

            const raycaster = new THREE.Raycaster(pos, dir);
            const intersects = raycaster.intersectObjects(roomGroup.children, true);
            
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                boundaryNodes.push(pt.clone());

                const marker = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshBasicMaterial({color: 0xfbbf24}));
                marker.position.copy(pt);
                scene.add(marker);
                nodeVisuals.push(marker);

                if (boundaryNodes.length >= 2) {
                    const p1 = boundaryNodes[boundaryNodes.length - 2];
                    const p2 = boundaryNodes[boundaryNodes.length - 1];
                    createWallSegment(p1, p2);
                }
            }
        }

        function createWallSegment(p1, p2) {
            const dist = p1.distanceTo(p2);
            const height = roomDimensions.h;

            const wallGeo = new THREE.PlaneGeometry(dist, height);
            const wallMat = new THREE.MeshStandardMaterial({ 
                map: wallTexture,
                normalMap: noiseNormalMap,
                normalScale: new THREE.Vector2(2.2, 2.2),
                roughness: 0.9,
                side: THREE.DoubleSide,
                transparent: false
            });

            const wallMesh = new THREE.Mesh(wallGeo, wallMat);
            const midpoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            
            wallMesh.position.set(midpoint.x, height / 2, midpoint.z);
            wallMesh.lookAt(p2.x, height / 2, p2.z);
            wallMesh.rotateY(Math.PI / 2);

            wallMesh.castShadow = true;
            wallMesh.receiveShadow = true;

            roomGroup.add(wallMesh);
            wallSegments.push(wallMesh);
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const time = clock.getElapsedTime();

                // Flickering
                scene.children.forEach(child => {
                    if (child.isPointLight && child.userData?.baseIntensity) {
                        child.intensity = child.userData.baseIntensity + Math.sin(time * 15 + child.userData.offset) * 0.4;
                    }
                });

                if (wallTexture) wallTexture.offset.y = time * 0.06 % 1;

                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
