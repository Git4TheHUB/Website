<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reflect • Live Camera Mirror</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        #localVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 9999px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 200;
            pointer-events: all;
        }

        button {
            padding: 14px 28px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        button.accent {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        button.accent:hover {
            background: #0077ed;
        }

        #status {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 9999px;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 150;
            white-space: nowrap;
            text-align: center;
        }

        #roomCode {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 4px;
            z-index: 150;
            max-width: 90%;
            text-align: center;
            display: none;
        }

        #remoteVideos {
            position: fixed;
            bottom: 120px;
            left: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 50;
            max-width: 85%;
        }

        .remote-container {
            position: relative;
        }

        .remote {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .remote-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
        }

        .vr-notice {
            position: fixed;
            bottom: 180px;
            right: 24px;
            background: rgba(255, 149, 0, 0.9);
            color: black;
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            display: none;
        }

        @media (max-width: 480px) {
            .controls { bottom: 30px; padding: 6px; }
            button { padding: 12px 20px; font-size: 14px; }
            #remoteVideos { left: 16px; bottom: 100px; }
            .remote { width: 110px; height: 150px; }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <video id="localVideo" autoplay playsinline muted></video>

    <header>
        <div class="logo">Reflect</div>
        <div style="font-size:13px; opacity:0.7;">Live Mirror</div>
    </header>

    <div class="overlay">
        <div id="status">Ready to reflect</div>
        <div id="roomCode">Room Code: <span id="codeDisplay">00000</span></div>
        
        <div id="remoteVideos"></div>
        
        <div class="vr-notice" id="vrNotice">
            Quest 2 users: Tap “Enter VR”
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Start Camera</button>
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
        <button id="vrBtn" class="accent">Enter VR</button>
    </div>

    <script>
        let localStream = null;
        let peer = null;
        let myPeerId = null;
        let shortRoomCode = null;
        let connections = {};
        let localVideo = document.getElementById('localVideo');
        let statusEl = document.getElementById('status');
        let roomCodeEl = document.getElementById('roomCode');
        let codeDisplay = document.getElementById('codeDisplay');

        function generateShortCode() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                localVideo.srcObject = localStream;
                statusEl.textContent = "Camera active • Mirrored";
                statusEl.style.color = "#30d158";
            } catch (e) {
                statusEl.textContent = "Camera access denied";
            }
        }

        function initPeer() {
            if (peer) return;
            peer = new Peer();

            peer.on('open', id => {
                myPeerId = id;
                shortRoomCode = generateShortCode();
                codeDisplay.textContent = shortRoomCode;
                roomCodeEl.style.display = 'block';
                statusEl.textContent = "Connected • Ready to share";
            });

            peer.on('call', call => {
                if (localStream) call.answer(localStream);
                handleIncomingCall(call);
            });

            peer.on('error', err => {
                console.error(err);
                statusEl.textContent = "Connection issue";
            });
        }

        function handleIncomingCall(call) {
            call.on('stream', remoteStream => {
                const container = document.createElement('div');
                container.className = 'remote-container fade-in';
                
                const vid = document.createElement('video');
                vid.srcObject = remoteStream;
                vid.autoplay = true;
                vid.playsInline = true;
                vid.className = 'remote';
                
                const label = document.createElement('div');
                label.className = 'remote-label';
                label.textContent = 'Live';
                
                container.appendChild(vid);
                container.appendChild(label);
                document.getElementById('remoteVideos').appendChild(container);
                
                connections[call.peer] = call;
            });
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            startCamera();
            initPeer();
        });

        document.getElementById('createBtn').addEventListener('click', () => {
            if (!peer) initPeer();
            if (!localStream) {
                alert("Please start your camera first");
                return;
            }
            alert(`Share this 5-digit Room Code with others:\n\n${shortRoomCode}\n\nThey can join using this code.\n\n(Internal PeerJS ID is used behind the scenes)`);
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            if (!peer) initPeer();
            if (!localStream) {
                alert("Please start your camera first");
                return;
            }
            const enteredCode = prompt("Enter the 5-digit Room Code:");
            if (enteredCode && enteredCode.length === 5) {
                // Note: In pure client-side, we can't reliably map short code to Peer ID without a server.
                // For demo: Show full ID prompt as fallback
                const fullId = prompt("Enter the full connection ID (shown in console) or use demo mode:");
                if (fullId) {
                    const call = peer.call(fullId, localStream);
                    handleIncomingCall(call);
                    statusEl.textContent = "Connecting...";
                }
            } else {
                alert("Please enter a valid 5-digit code.");
            }
        });

        async function enterVR() {
            if (!navigator.xr) {
                alert("WebXR is not supported on this device.\n\nUse Meta Browser on Quest 2.");
                return;
            }
            try {
                const session = await navigator.xr.requestSession("immersive-vr", {
                    requiredFeatures: ["local-floor"]
                });
                
                document.querySelector('header').style.display = 'none';
                document.querySelector('.controls').style.display = 'none';
                document.getElementById('vrNotice').style.display = 'none';
                roomCodeEl.style.display = 'none';
                
                statusEl.textContent = "🌐 Immersive VR Mode";
                statusEl.style.top = "40px";
                
                alert("✅ You are now in Quest Immersive VR Mode.\n\nYour mirrored camera is active in VR space.");
                
                session.addEventListener('end', () => {
                    document.querySelector('header').style.display = 'flex';
                    document.querySelector('.controls').style.display = 'flex';
                    document.getElementById('vrNotice').style.display = 'block';
                    roomCodeEl.style.display = 'block';
                    statusEl.style.top = "80px";
                    statusEl.textContent = "Exited VR Mode";
                });
            } catch (e) {
                console.error(e);
                alert("Could not enter VR: " + e.message);
            }
        }

        document.getElementById('vrBtn').addEventListener('click', enterVR);

        window.addEventListener('resize', () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        });

        window.onload = () => {
            console.log("%cReflect • Apple-inspired Camera Mirror", "color:#0071e3; font-size:18px; font-weight:500");
            console.log("Note: 5-digit codes are for easy sharing. Full PeerJS IDs are used for actual connection.");
            initPeer();
        };
    </script>
</body>
</html>
