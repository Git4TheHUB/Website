<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 to Roblox Controller</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        #vr-button {
            background: #00e676;
            color: black;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 50px;
        }
        #vr-button:disabled {
            background: #555;
            color: #aaa;
        }
        #log {
            margin-top: 30px;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            display: inline-block;
            min-width: 300px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Quest 3 Immersive Relay</h1>
    <p>Ensure your server is running at the address below:</p>
    <h3 id="server-ip">Target: http://192.168.1.22:8080</h3>

    <button id="vr-button" disabled>Loading WebXR...</button>
    <br>
    <div id="log">Status: Initializing...</div>

<script>
        const RELAY_URL = "http://192.168.1.22:8080/quest";
        const vrButton = document.getElementById('vr-button');
        const logDiv = document.getElementById('log');
        
        let xrSession = null;

        function log(msg) {
            logDiv.innerText = msg;
            console.log(msg);
        }

        // 1. Check for Strict Secure Context (The reason it hung before)
        if (!window.isSecureContext) {
            vrButton.innerText = "SECURITY BLOCK";
            log("BLOCKED: Quest requires HTTPS for VR. To fix: Go to chrome://flags in the Quest Browser, search 'Insecure origins treated as secure', add http://192.168.1.22:8080, enable it, and relaunch.");
        } 
        // 2. Check if WebXR is supported
        else if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                if (supported) {
                    vrButton.disabled = false;
                    vrButton.innerText = "ENTER IMMERSIVE VR MODE";
                    log("Ready to enter immersive mode.");
                } else {
                    vrButton.innerText = "VR UNAVAILABLE";
                    log("Error: Immersive VR mode not supported on this device.");
                }
            }).catch(err => {
                log("Error checking VR support: " + err);
            });
        } else {
            vrButton.innerText = "WEBXR MISSING";
            log("Error: WebXR API not detected in this browser.");
        }

        vrButton.addEventListener('click', () => {
            if (!xrSession && !vrButton.disabled) {
                navigator.xr.requestSession('immersive-vr', {
                    requiredFeatures: ['local-floor']
                }).then(onSessionStarted).catch(err => log("Session Failed: " + err));
            }
        });

        function onSessionStarted(session) {
            xrSession = session;
            vrButton.innerText = "EXIT IMMERSIVE MODE";
            log("In Immersive VR Mode. Readout Active.");
            
            session.requestReferenceSpace('local-floor').then((refSpace) => {
                session.requestAnimationFrame(function onXRFrame(time, frame) {
                    if (!xrSession) return;
                    readControllers(session);
                    xrSession.requestAnimationFrame(onXRFrame);
                });
            });
        }

        function readControllers(session) {
            let payload = { moveX: 0, moveZ: 0, lookX: 0, lookY: 0, jump: false, primaryAction: false };

            for (let inputSource of session.inputSources) {
                if (inputSource.gamepad) {
                    const axes = inputSource.gamepad.axes;
                    const buttons = inputSource.gamepad.buttons;
                    const hand = inputSource.handedness;

                    if (hand === 'left') {
                        payload.moveX = axes[2] || 0; 
                        payload.moveZ = axes[3] || 0;
                    } 
                    else if (hand === 'right') {
                        payload.lookX = axes[2] || 0;
                        payload.lookY = axes[3] || 0;
                        if (buttons[4] && buttons[4].pressed) payload.jump = true;
                        if (buttons[0] && buttons[0].pressed) payload.primaryAction = true;
                    }
                }
            }
            sendData(payload);
        }

        function sendData(payload) {
            fetch(RELAY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.log("Network drop: ", err));
        }
    </script>
</body>
</html>
