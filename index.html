<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 to Roblox Controller</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        #vr-button {
            background: #00e676;
            color: black;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 50px;
        }
        #vr-button:disabled {
            background: #555;
            color: #aaa;
        }
        #log {
            margin-top: 30px;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            display: inline-block;
            min-width: 300px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Quest 3 Immersive Relay</h1>
    <p>Ensure your server is running at the address below:</p>
    <h3 id="server-ip">Target: http://192.168.1.22:8080</h3>

    <button id="vr-button" disabled>Loading WebXR...</button>
    <br>
    <div id="log">Status: Initializing...</div>

    <script>
        const RELAY_URL = "http://192.168.1.22:8080/quest";
        const vrButton = document.getElementById('vr-button');
        const logDiv = document.getElementById('log');
        
        let xrSession = null;

        function log(msg) {
            logDiv.innerText = msg;
            console.log(msg);
        }

        // Check if WebXR is supported
        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                if (supported) {
                    vrButton.disabled = false;
                    vrButton.innerText = "ENTER IMMERSIVE VR MODE";
                    log("Ready to enter immersive mode.");
                } else {
                    log("Error: Immersive VR mode not supported on this browser.");
                }
            });
        } else {
            log("Error: WebXR API not detected.");
        }

        vrButton.addEventListener('click', () => {
            if (!xrSession) {
                navigator.xr.requestSession('immersive-vr', {
                    requiredFeatures: ['local-floor']
                }).then(onSessionStarted).catch(err => log("Session Failed: " + err));
            }
        });

        function onSessionStarted(session) {
            xrSession = session;
            vrButton.innerText = "EXIT IMMERSIVE MODE";
            log("In Immersive VR Mode. Readout Active.");
            
            // WebXR loop requires a reference space
            session.requestReferenceSpace('local-floor').then((refSpace) => {
                session.requestAnimationFrame(function onXRFrame(time, frame) {
                    if (!xrSession) return;
                    
                    readControllers(session);
                    xrSession.requestAnimationFrame(onXRFrame);
                });
            });
        }

        function readControllers(session) {
            let payload = {
                moveX: 0,
                moveZ: 0,
                lookX: 0,
                lookY: 0,
                jump: false,
                primaryAction: false
            };

            // Iterate over active hand tracking controllers
            for (let inputSource of session.inputSources) {
                if (inputSource.gamepad) {
                    const axes = inputSource.gamepad.axes;
                    const buttons = inputSource.gamepad.buttons;
                    const hand = inputSource.handedness;

                    if (hand === 'left') {
                        // Left Stick maps to Movement Translation
                        payload.moveX = axes[2] || 0; 
                        payload.moveZ = axes[3] || 0;
                    } 
                    else if (hand === 'right') {
                        // Right Stick maps to Camera/Orientation Rotation
                        payload.lookX = axes[2] || 0;
                        payload.lookY = axes[3] || 0;
                        
                        // Primary Face Button (A button on right touch controller) maps to Jump
                        if (buttons[4] && buttons[4].pressed) {
                            payload.jump = true;
                        }
                        // Trigger button maps to Primary Action
                        if (buttons[0] && buttons[0].pressed) {
                            payload.primaryAction = true;
                        }
                    }
                }
            }

            sendData(payload);
        }

        function sendData(payload) {
            // Only fire data out if input exists to avoid filling the network buffer
            fetch(RELAY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                log(`Sending Data:\nLX: ${payload.moveX.toFixed(2)} | LZ: ${payload.moveZ.toFixed(2)}\nRX: ${payload.lookX.toFixed(2)} | Jump: ${payload.jump}`);
            })
            .catch(err => console.all("Network drop: ", err));
        }
    </script>
</body>
</html>
