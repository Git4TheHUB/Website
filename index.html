<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DVD Chaos</title>

<style>
body, html {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    height:100vh;
    width:100vw;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:system-ui;
}
</style>
</head>

<body>

<div>
    E = FASTER<br>
    Q = SLOWER
</div>

<script>
let dvdWindows = [];
let mainStream = null;

// get webcam once (important for popups)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    mainStream = stream;
})
.catch(() => {});

// spawn window
function spawnDvdWindow() {

    const width = 180;
    const height = 110;

    const win = window.open("", "", `
        width=${width},
        height=${height},
        resizable=no
    `);

    if (!win) return;

    dvdWindows.push(win);

    win.document.write(`
    <html>
    <head>
    <style>
        body,html {
            margin:0;
            overflow:hidden;
            background:black;
        }

        #cam {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:cover;
        }

        #gif {
            position:absolute;
            width:100%;
            height:100%;
            object-fit:contain;

            /* fake transparency */
            mix-blend-mode: screen;
            pointer-events:none;
        }
    </style>
    </head>

    <body>
        <video id="cam" autoplay muted playsinline></video>
        <img id="gif" src="https://i.redd.it/brvc63j20c751.gif">

        <script>
        let vx = 1.2;  // VERY slow default
        let vy = 0.9;

        window.setSpeed = (m) => {
            vx *= m;
            vy *= m;
        };

        function bounce() {
            let x = window.screenX;
            let y = window.screenY;

            const w = window.outerWidth;
            const h = window.outerHeight;

            x += vx;
            y += vy;

            const sw = screen.availWidth;
            const sh = screen.availHeight;

            if (x <= 0 || x + w >= sw) vx *= -1;
            if (y <= 0 || y + h >= sh) vy *= -1;

            window.moveTo(x, y);

            requestAnimationFrame(bounce);
        }

        navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            document.getElementById("cam").srcObject = stream;
        })
        .catch(() => {});

        setTimeout(() => {
            window.moveTo(
                Math.random() * (screen.availWidth - ${width}),
                Math.random() * (screen.availHeight - ${height})
            );
            bounce();
        }, 300);
        <\/script>
    </body>
    </html>
    `);

    win.document.close();
}

// spawn 5 windows
window.onload = () => {
    for (let i = 0; i < 5; i++) {
        setTimeout(spawnDvdWindow, i * 200);
    }
};

// controls
document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    if (key === "e") {
        dvdWindows.forEach(w => !w.closed && w.setSpeed(1.4));
    }

    if (key === "q") {
        dvdWindows.forEach(w => !w.closed && w.setSpeed(0.7));
    }
});
</script>

</body>
</html>
