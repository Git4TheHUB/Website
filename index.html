<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reflect • Live Camera Mirror</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        #localVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 9999px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 200;
            pointer-events: all;
        }

        button {
            padding: 14px 24px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        button.accent {
            background: var(--accent);
            font-weight: 600;
        }

        #status {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 9999px;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 150;
            white-space: nowrap;
        }

        #roomInfo {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 15px;
            z-index: 150;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        #remoteVideos {
            position: fixed;
            bottom: 130px;
            left: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 50;
            max-width: 85%;
        }

        .remote-container {
            position: relative;
        }

        .remote {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .remote-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
        }

        .vr-notice {
            position: fixed;
            bottom: 190px;
            right: 24px;
            background: rgba(255, 149, 0, 0.9);
            color: black;
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            display: none;
        }

        @media (max-width: 480px) {
            .controls { bottom: 30px; padding: 6px; }
            button { padding: 12px 20px; font-size: 14px; }
            #remoteVideos { left: 16px; bottom: 110px; }
            .remote { width: 110px; height: 150px; }
        }
    </style>
</head>
<body>
    <video id="localVideo" autoplay playsinline muted></video>

    <header>
        <div class="logo">Reflect</div>
        <div style="font-size:13px; opacity:0.7;">Live Mirror</div>
    </header>

    <div class="overlay">
        <div id="status">Ready</div>
        
        <div id="roomInfo">
            <div>Room Code: <strong id="roomCodeDisplay">00000</strong></div>
            <button id="copyCodeBtn" style="padding: 6px 14px; font-size: 13px;">Copy Code</button>
        </div>

        <div id="remoteVideos"></div>
        
        <div class="vr-notice" id="vrNotice">
            Quest 2 users: Tap “Enter VR”
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Start Camera</button>
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
        <button id="vrBtn" class="accent">Enter VR</button>
    </div>

    <script>
        let localStream = null;
        let peer = null;
        let myPeerId = null;
        let shortRoomCode = null;
        let connections = {};
        let localVideo = document.getElementById('localVideo');
        let statusEl = document.getElementById('status');
        let remoteVideosContainer = document.getElementById('remoteVideos');
        let roomCodeDisplay = document.getElementById('roomCodeDisplay');

        function generateShortCode() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                localVideo.srcObject = localStream;
                statusEl.textContent = "Camera Active • Mirrored";
                statusEl.style.color = "#30d158";
                return true;
            } catch (e) {
                console.error(e);
                statusEl.textContent = "Camera access denied";
                statusEl.style.color = "#ff453a";
                return false;
            }
        }

        function initPeer() {
            if (peer) return;
            
            peer = new Peer();

            peer.on('open', id => {
                myPeerId = id;
                shortRoomCode = generateShortCode();
                roomCodeDisplay.textContent = shortRoomCode;
                document.getElementById('roomInfo').style.display = 'flex';
                statusEl.textContent = "Ready • Share 5-digit code";
            });

            peer.on('call', call => {
                if (localStream) {
                    call.answer(localStream);
                    handleRemoteStream(call);
                }
            });

            peer.on('error', err => {
                console.error(err);
                statusEl.textContent = "Connection error";
            });
        }

        function handleRemoteStream(call) {
            call.on('stream', remoteStream => {
                const existing = document.getElementById(`remote-${call.peer}`);
                if (existing) existing.remove();

                const container = document.createElement('div');
                container.className = 'remote-container';
                container.id = `remote-${call.peer}`;

                const vid = document.createElement('video');
                vid.srcObject = remoteStream;
                vid.autoplay = true;
                vid.playsInline = true;
                vid.className = 'remote';

                const label = document.createElement('div');
                label.className = 'remote-label';
                label.textContent = 'Live';

                container.appendChild(vid);
                container.appendChild(label);
                remoteVideosContainer.appendChild(container);

                connections[call.peer] = call;
                statusEl.textContent = "Connected";
            });

            call.on('close', () => {
                const el = document.getElementById(`remote-${call.peer}`);
                if (el) el.remove();
            });
        }

        document.getElementById('startBtn').addEventListener('click', async () => {
            await startCamera();
            initPeer();
        });

        document.getElementById('createBtn').addEventListener('click', () => {
            if (!localStream) {
                alert("Please start your camera first");
                return;
            }
            initPeer();
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            if (!localStream) {
                alert("Please start your camera first");
                return;
            }
            initPeer();

            const enteredCode = prompt("Enter 5-digit Room Code:");
            if (enteredCode && enteredCode.length === 5) {
                const fullId = prompt("Enter the full Peer ID for this room (ask the host):");
                if (fullId) {
                    const call = peer.call(fullId, localStream);
                    handleRemoteStream(call);
                    statusEl.textContent = "Connecting...";
                }
            } else {
                alert("Please enter a valid 5-digit code.");
            }
        });

        document.getElementById('copyCodeBtn').addEventListener('click', () => {
            if (shortRoomCode) {
                navigator.clipboard.writeText(shortRoomCode).then(() => {
                    const btn = document.getElementById('copyCodeBtn');
                    const original = btn.textContent;
                    btn.textContent = "Copied!";
                    setTimeout(() => btn.textContent = original, 2000);
                });
            }
        });

        async function enterVR() {
            if (!navigator.xr) {
                alert("WebXR not supported.\n\nBest on Meta Quest Browser.");
                return;
            }
            try {
                const session = await navigator.xr.requestSession("immersive-vr", {
                    requiredFeatures: ["local-floor"]
                });

                document.querySelector('header').style.display = 'none';
                document.querySelector('.controls').style.display = 'none';
                document.getElementById('roomInfo').style.display = 'none';

                statusEl.textContent = "VR Mode Active";
                statusEl.style.top = "40px";

                session.addEventListener('end', () => {
                    document.querySelector('header').style.display = 'flex';
                    document.querySelector('.controls').style.display = 'flex';
                    document.getElementById('roomInfo').style.display = 'flex';
                    statusEl.style.top = "80px";
                    statusEl.textContent = "Exited VR";
                });
            } catch (e) {
                alert("Failed to enter VR: " + e.message);
            }
        }

        document.getElementById('vrBtn').addEventListener('click', enterVR);

        window.addEventListener('beforeunload', () => {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (peer) peer.destroy();
        });

        window.onload = () => {
            console.log("%cReflect • Live Camera Mirror", "color:#0071e3; font-size:18px; font-weight:600");
            console.log("5-digit codes are for sharing. Full PeerJS ID is still required for connection (prompted on join).");
        };
    </script>
</body>
</html>
