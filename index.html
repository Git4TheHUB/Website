<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aztec Temple • 3D Model Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root {
    --bg: #0f1f1c;
    --card: #1a2e28;
    --accent: #e8b923;
    --text: #f0e6d2;
    --muted: #a89f7f;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, var(--bg), #0a1814);
    color: var(--text);
}

/* HEADER */

header {
    background: rgba(10,24,20,0.95);
    border-bottom: 3px solid var(--accent);
    padding: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-start;
}

.logo {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
}

/* CONTROLS */

.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
    flex: 1;
}

.input-group {
    display:flex;
    flex-direction:column;
    font-size: 0.75rem;
}

.input-group input,
.input-group select {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background:#0a1814;
    color:white;
    width: clamp(120px, 15vw, 180px);
}

button {
    padding: 10px 16px;
    border:none;
    border-radius: 10px;
    background: var(--accent);
    cursor:pointer;
    font-weight:600;
}

button.secondary {
    background:#2f4a44;
    color:white;
}

/* LAYOUT */

main {
    display:flex;
    gap:20px;
    padding:20px;
}

.sidebar {
    width:300px;
    background:var(--card);
    border-radius:16px;
    padding:16px;
}

.model-list {
    list-style:none;
    max-height:400px;
    overflow:auto;
}

.model-list li {
    padding:10px;
    cursor:pointer;
    border-radius:8px;
}

.model-list li:hover {
    background:#2f4a44;
}

.model-list li.active {
    background: var(--accent);
    color:black;
}

/* VIEWER */

.viewer-container {
    flex:1;
    display:flex;
    flex-direction:column;
}

model-viewer {
    width:100%;
    height: clamp(400px, 65vh, 800px);
    border-radius:16px;
    background:#0a1814;
}

/* MOBILE */

@media(max-width:900px){
    main { flex-direction:column; }
    .sidebar { width:100%; }
}

</style>
</head>

<body>

<header>
    <div class="logo">AZTEC TEMPLE</div>

    <div class="controls">
        <div class="input-group">
            <label>User</label>
            <input id="username" value="Git4TheHUB">
        </div>

        <div class="input-group">
            <label>Repo</label>
            <input id="repo" value="Website">
        </div>

        <div class="input-group">
            <label>Branch</label>
            <select id="branch">
                <option value="main">main</option>
            </select>
        </div>

        <button onclick="fetchModels()">Refresh</button>
        <button onclick="loadDemo()" class="secondary">Demo</button>
    </div>
</header>

<main>

<div class="sidebar">
    <h3>Models</h3>
    <ul id="modelList" class="model-list"></ul>
</div>

<div class="viewer-container">

    <h3 id="currentModelName">Loading...</h3>

    <model-viewer
        id="viewer"
        src="https://cdn.jsdelivr.net/gh/Git4TheHUB/Website@main/Models/scene.gltf"
        camera-controls
        auto-rotate
        exposure="1"
        shadow-intensity="1">
    </model-viewer>

</div>

</main>

<script>
let viewer;
let currentUser = 'Git4TheHUB';
let currentRepo = 'Website';
let currentBranch = 'main';

function init(){
    viewer = document.getElementById('viewer');
    fetchModels();

    viewer.addEventListener('load', () => {
        console.log('✅ Model loaded');
    });

    viewer.addEventListener('error', e => {
        console.error('❌ Model failed', e);
    });
}

async function fetchModels(){
    const list = document.getElementById('modelList');
    list.innerHTML = "Loading...";

    const url = `https://api.github.com/repos/${currentUser}/${currentRepo}/contents/Models?ref=${currentBranch}`;

    try{
        const res = await fetch(url);
        const data = await res.json();

        const models = data.filter(f =>
            f.name.endsWith('.glb') || f.name.endsWith('.gltf')
        );

        list.innerHTML = "";

        models.forEach(m=>{
            const li = document.createElement('li');
            li.textContent = m.name;
            li.onclick = () => loadModel(m.name);
            list.appendChild(li);
        });

    }catch(e){
        list.innerHTML = "Error loading models";
    }
}

function loadModel(name){
    const url = `https://cdn.jsdelivr.net/gh/${currentUser}/${currentRepo}@${currentBranch}/Models/${name}`;

    viewer.src = url;
    document.getElementById('currentModelName').textContent = name;

    document.querySelectorAll('#modelList li').forEach(li=>{
        li.classList.toggle('active', li.textContent === name);
    });
}

function loadDemo(){
    viewer.src = "https://modelviewer.dev/shared-assets/models/Astronaut.glb";
    document.getElementById('currentModelName').textContent = "Demo Model";
}

window.onload = init;
</script>

</body>
</html>
        window.onload = initialize;
    </script>
</body>
</html>
