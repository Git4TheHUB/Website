<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swarm</title>
<style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
}
#bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>
<img id="bg" src="https://i.redd.it/brvc63j20c751.gif">

<button id="start">Start Swarm</button>

<script>
function spawnWindow() {
    const w = 260;
    const h = 180;

    const win = window.open("https://www.crazygames.com", "", `width=${w},height=${h}`);
    if (!win) return;

    startMovement(win);
}

document.getElementById("start").onclick = () => {
    // spawn windows immediately
    for (let i = 0; i < 5; i++) {
        spawnWindow();
    }

    // keep spawning more
    setInterval(spawnWindow, 10000);
};

function startMovement(win) {
    let x = win.screenX;
    let y = win.screenY;
    let vx = (Math.random() - 0.5) * 6;
    let vy = (Math.random() - 0.5) * 6;

    function loop() {
        try {
            x += vx;
            y += vy;

            const sw = screen.availWidth;
            const sh = screen.availHeight;

            if (x <= 0 || x >= sw - win.outerWidth) vx *= -1;
            if (y <= 0 || y >= sh - win.outerHeight) vy *= -1;

            win.moveTo(x, y);
            win.requestAnimationFrame(loop);
        } catch {
            // window closed
        }
    }

    loop();
}
</script>
</body>
</html>
